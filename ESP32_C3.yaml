
esphome:
  name: esp32_c3
  friendly_name: ESP32_C3
  # Automatically add the mac address to the name
  # so you can use a single firmware for all devices
  name_add_mac_suffix: true
  platformio_options:
    board_build.flash_mode: dio
    board_build.mcu: esp32c3
    board_build.f_cpu: 80000000L

  # This will allow for project identification,
  # configuration and updates.
  project:
    name: MorganMLGman.ESPHome_Templates
    version: "1.1.1"

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf

# To be able to get logs from the device via serial and api.
logger:
  hardware_uart: UART0 # USB_SERIAL_JTAG
  level: DEBUG
# API is a requirement of the dashboard import.
api:
  reboot_timeout: 10min

# OTA is required for Over-the-Air updating
ota:
  - platform: esphome

dashboard_import:
  package_import_url: github://MorganMLGman/ESPHome_Templates/ESP32_C3.yaml@master

wifi:
  reboot_timeout: 10min
  # Set up a wifi access point using the device name above
  ap:

# In combination with the `ap` this allows the user
# to provision wifi credentials to the device.
captive_portal:

esp32_improv:
  authorizer: none

# Sets up the improv via serial client for Wi-Fi provisioning.
# Handy if your device has a usb port for the user to add credentials when they first get it.
improv_serial:

time:
  - platform: homeassistant
    id: homeassistant_time

text_sensor:
  - platform: version
    name: ESPHome Version
    entity_category: "diagnostic"

  - platform: wifi_info
    ip_address:
      name: IP Address
      entity_category: "diagnostic"
    ssid:
      name: WiFi SSID
      entity_category: "diagnostic"
    bssid:
      name: WiFi BSSID
      entity_category: "diagnostic"

binary_sensor:
  - platform: status
    name: Status
    device_class: connectivity

sensor:
  - platform: wifi_signal
    name: WiFi Signal dB
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"

  - platform: copy
    source_id: wifi_signal_db
    name: WiFi Signal Percent
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: "diagnostic"

  - platform: uptime
    name: Uptime
    update_interval: 60s
    accuracy_decimals: 0
    icon: mdi:clock-outline
    entity_category: "diagnostic"

button:
  - platform: shutdown
    name: Shut Down

  - platform: restart
    name: Restart
  
  - platform: safe_mode
    name: Safe Mode

light:
  - platform: status_led
    name: "User LED"
    pin: 
      number: GPIO8
      inverted: True

sensor:
  - platform: internal_temperature
    name: "Internal Temperature"
